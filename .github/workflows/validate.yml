name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml python-docx pdfplumber pypdf python-pptx reportlab

      - name: Run unit tests
        run: PYTHONPYCACHEPREFIX=/tmp/bookworm-pycache python -m unittest discover -s plugins/bookworm/tests -v

      - name: Validate public package
        run: python scripts/validate_public_package.py

      - name: Check whitespace
        run: git diff --check
